const uid = () => Math.random().toString(36).slice(2, 10);

const fmtDate = (d) => {
  if (!d) return "—";
  const dt = new Date(d + "T00:00:00");
  if (isNaN(dt)) return "—";
  return dt.toLocaleDateString("en-ZA", { day: "2-digit", month: "short", year: "numeric" });
};
const daysUntil = (d) => {
  if (!d) return null;
  const dt = new Date(d + "T00:00:00");
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return Math.round((dt - now) / 86400000);
};
const seqNum = (list, prefix) => {
  const year = new Date().getFullYear();
  const n = list.length + 1;
  return `${prefix}-${year}-${String(n).padStart(4, "0")}`;
};

/* ============================== STORAGE (Supabase-backed) ==============================
   Data lives in a single `app_state` table: one row per key, value stored as jsonb.
   This mirrors the original key/value shape closely so the rest of the app barely changes. */
async function loadKey(key, fallback) {
  try {
    const { data, error } = await supabase.from("app_state").select("value").eq("key", key).maybeSingle();
    if (error || !data) return fallback;
    return data.value ?? fallback;
  } catch (e) {
    return fallback;
  }
}
async function saveKey(key, value) {
  try { await supabase.from("app_state").upsert({ key, value }); } catch (e) {}
}

/* ============================== DOCUMENT ATTACHMENTS (Supabase Storage) ==============================
   Real files (quotes, POs, waybill scans, anything else) live in the "fortis-docs" storage bucket,
   one folder per order. We only ever store the file's path on the order record — the actual bytes
   stay in Storage, fetched via short-lived signed URLs when someone taps to view. */
const DOCS_BUCKET = "fortis-docs";

async function uploadDocument(orderId, docType, file) {
  const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, "_");
  const path = `${orderId}/${docType}-${Date.now()}-${safeName}`;
  const { error } = await supabase.storage.from(DOCS_BUCKET).upload(path, file, { upsert: false });
  if (error) throw error;
  return { id: uid(), path, name: file.name, docType, uploadedAt: new Date().toISOString() };
}

async function getDocumentUrl(path) {
  const { data, error } = await supabase.storage.from(DOCS_BUCKET).createSignedUrl(path, 3600);
  if (error) return null;
  return data.signedUrl;
}

async function deleteDocument(path) {
  try { await supabase.storage.from(DOCS_BUCKET).remove([path]); } catch (e) {}
}

function makeGlowTexture(color1, color2) {
  const size = 256;
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, color1);
  grad.addColorStop(0.4, color2);
  grad.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  return tex;
}

function TruckScene({ progressRef }) {
  const mountRef = useRef(null);
  const frameRef = useRef(null);

  useEffect(() => {
    const mount = mountRef.current;
    const width = mount.clientWidth, height = mount.clientHeight;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x1b2c40, 0.017);

    const camera = new THREE.PerspectiveCamera(38, width / height, 0.1, 200);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    mount.appendChild(renderer.domElement);

    // dusk sky gradient — navy overhead fading to a warm amber horizon
    const skyGeo = new THREE.SphereGeometry(95, 24, 24);
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        top: { value: new THREE.Color(0x0a1626) },
        mid: { value: new THREE.Color(0x3a4f6b) },
        horizon: { value: new THREE.Color(0xdb7a2e) },
      },
      vertexShader: `varying vec3 vPos; void main(){ vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
      fragmentShader: `
        varying vec3 vPos; uniform vec3 top; uniform vec3 mid; uniform vec3 horizon;
        void main(){
          float h = normalize(vPos).y;
          vec3 col = h > 0.06 ? mix(mid, top, smoothstep(0.06, 0.85, h)) : mix(horizon, mid, smoothstep(-0.08, 0.06, h));
          gl_FragColor = vec4(col, 1.0);
        }`
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    // glowing sun disc low on the horizon
    const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: makeGlowTexture("rgba(255,214,153,0.95)", "rgba(232,146,46,0.35)"),
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending,
    }));
    sunGlow.scale.set(46, 46, 1);
    sunGlow.position.set(-14, 4.2, -55);
    scene.add(sunGlow);
    const sunCore = new THREE.Mesh(new THREE.CircleGeometry(2.6, 32), new THREE.MeshBasicMaterial({ color: 0xffe3ab }));
    sunCore.position.set(-14, 4.2, -54.9);
    scene.add(sunCore);

    // lights — warm key (low sun), cool blue rim/fill, soft ambient
    const amb = new THREE.AmbientLight(0x5b7291, 0.55);
    scene.add(amb);
    const sun = new THREE.DirectionalLight(0xffb877, 2.0);
    sun.position.set(-10, 9, -8);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -14; sun.shadow.camera.right = 14;
    sun.shadow.camera.top = 14; sun.shadow.camera.bottom = -14;
    sun.shadow.bias = -0.0015;
    scene.add(sun);
    const rim = new THREE.DirectionalLight(0x4e9bd4, 1.1);
    rim.position.set(9, 4, 9);
    scene.add(rim);
    const fill = new THREE.DirectionalLight(0x8fb3d6, 0.35);
    fill.position.set(0, 3, 12);
    scene.add(fill);

    // ground
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x18283a, roughness: 0.95 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(50, 220), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // road with subtle sheen
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x233246, roughness: 0.65, metalness: 0.08 });
    const road = new THREE.Mesh(new THREE.PlaneGeometry(6.6, 220), roadMat);
    road.rotation.x = -Math.PI / 2;
    road.position.y = 0.01;
    road.receiveShadow = true;
    scene.add(road);

    // lane dashes
    const dashGroup = new THREE.Group();
    const dashGeo = new THREE.BoxGeometry(0.18, 0.02, 1.4);
    const dashMat = new THREE.MeshStandardMaterial({ color: 0xE8922E, emissive: 0x7a3f0e, emissiveIntensity: 0.6, roughness: 0.5 });
    const DASH_COUNT = 44, DASH_SPACING = 5;
    for (let i = 0; i < DASH_COUNT; i++) {
      const m = new THREE.Mesh(dashGeo, dashMat);
      m.position.set(0, 0.02, -i * DASH_SPACING + 40);
      dashGroup.add(m);
    }
    scene.add(dashGroup);

    // roadside bollards
    const bollardGroup = new THREE.Group();
    const bollardGeo = new THREE.CylinderGeometry(0.07, 0.09, 0.9, 8);
    const bollardMat = new THREE.MeshStandardMaterial({ color: 0x3a5570, roughness: 0.6 });
    const bollardCapMat = new THREE.MeshStandardMaterial({ color: 0xE8922E, emissive: 0xE8922E, emissiveIntensity: 0.4 });
    for (let i = 0; i < 32; i++) {
      [-4.4, 4.4].forEach((x) => {
        const g = new THREE.Group();
        const m = new THREE.Mesh(bollardGeo, bollardMat);
        m.position.y = 0.45;
        m.castShadow = true;
        g.add(m);
        const cap = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), bollardCapMat);
        cap.position.y = 0.92;
        g.add(cap);
        g.position.set(x, 0, -i * 6.8 + 40);

    scene.add(bollardGroup);

    // distant low-poly hills / silhouettes for parallax depth

      const m = new THREE.Mesh(geo, hillMat);

    scene.add(hillGroup);

    /* ================= TRUCK — detailed rig ================= */
    const truck = new THREE.Group();

    const rimMat = new THREE.MeshStandardMaterial({ color: 0xd7dde3, roughness: 0.2, metalness: 0.9 });
    const chromeMat = new THREE.MeshStandardMaterial({ color: 0xe6ebef, roughness: 0.12, metalness: 0.95 });
    const headlightMat = new THREE.MeshStandardMaterial({ color: 0xfff2cf, emissive: 0xffcf7a, emissiveIntensity: 2.2 });

    const plateMat = new THREE.MeshStandardMaterial({ color: 0xf2f0ec, roughness: 0.5 });

    // cab
    const cab = new THREE.Mesh(new THREE.BoxGeometry(2.0, 1.55, 1.95), navyPaint);

    // chassis rail linking cab to trailer
    [-0.75, 0.75].forEach((x) => {

      rail.position.set(x, 0.55, 0.2);

    // trailer (flatbed-style container body)

    // rear doors + tail lights + underride bar
    const rearFrame = new THREE.Mesh(new THREE.BoxGeometry(2.3, 2.3, 0.06), darkTrim);
    rearFrame.position.set(0, 1.72, -5.32);
    truck.add(rearFrame);
    [-0.95, 0.95].forEach((x) => {
      const tl = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.32, 0.06), taillightMat);
      tl.position.set(x, 1.15, -5.34);
      truck.add(tl);
    });
    const underride = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.1, 0.1), chromeMat);
    underride.position.set(0, 0.42, -5.2);
    truck.add(underride);
    const plate = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.28, 0.02), plateMat);
    plate.position.set(0, 0.65, -5.35);
    truck.add(plate);

    // mudflaps
    [[-1.05, 3.9], [1.05, 3.9], [-1.15, -3.85], [1.15, -3.85]].forEach(([x, z]) => {
      const flap = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.42, 0.03), darkTrim);
      flap.position.set(x, 0.32, z);
      truck.add(flap);
    });

    // wheels — tire + chrome rim + hub, front single / rear dual-look
    const wheels = [];
    const tireGeo = new THREE.CylinderGeometry(0.56, 0.56, 0.4, 22);
    const rimGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.42, 22);
    const hubGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.44, 12);
    const wheelPositions = [
      [-1.15, 0.56, 3.35], [1.15, 0.56, 3.35],
      [-1.22, 0.56, -0.55], [1.22, 0.56, -0.55],
      [-1.22, 0.56, -3.75], [1.22, 0.56, -3.75],
    ];
    wheelPositions.forEach(([x, y, z]) => {
      const wheelGroup = new THREE.Group();
      const tire = new THREE.Mesh(tireGeo, tireMat);
      tire.rotation.z = Math.PI / 2;
      tire.castShadow = true;
      wheelGroup.add(tire);
      const rimMesh = new THREE.Mesh(rimGeo, rimMat);
      rimMesh.rotation.z = Math.PI / 2;
      wheelGroup.add(rimMesh);
      const hub = new THREE.Mesh(hubGeo, chromeMat);
      hub.rotation.z = Math.PI / 2;
      wheelGroup.add(hub);
      wheelGroup.position.set(x, y, z);
      truck.add(wheelGroup);
      wheels.push(wheelGroup);
    });

    truck.position.set(0, 0, 4);
    scene.add(truck);

    camera.position.set(-6, 7, 16);
    camera.lookAt(0, 1, 0);

    let raf;
    const clock = new THREE.Clock();
    const animate = () => {
      const t = clock.getElapsedTime();
      const p = progressRef.current || 0;

      // camera: aerial establishing -> lower cinematic follow -> close orbit
      const camX = THREE.MathUtils.lerp(-10, -3.2, Math.min(p / 0.6, 1));
      const camY = THREE.MathUtils.lerp(9.5, 2.5, Math.min(p / 0.7, 1));
      const camZ = THREE.MathUtils.lerp(20, 7.2, Math.min(p / 0.7, 1));
      camera.position.set(camX, camY, camZ);
      camera.lookAt(0, 1.1, 0.5 - p * 2);

      // suspension bob + sway
      truck.position.y = Math.sin(t * 6) * 0.02;
      truck.rotation.z = Math.sin(t * 1.3) * 0.008;
      truck.rotation.y = Math.sin(t * 0.6) * 0.012;

      // wheel spin
      wheels.forEach((w) => (w.rotation.x -= 0.25));

      // road / dashes / bollards / hills stream toward camera based on scroll progress
      dashGroup.children.forEach((m, i) => {
        m.position.z = ((-i * 5 + 40 + p * 260 + t * 3.4) % 220) - 60;
      });
      bollardGroup.children.forEach((g, i) => {
        const idx = Math.floor(i / 2);
        g.position.z = ((-idx * 6.8 + 40 + p * 260 * 0.98 + t * 3.4) % 220) - 60;
      });
      hillGroup.children.forEach((m, i) => {
        m.position.z = ((-i * 15 + 20 + p * 260 * 0.4) % 240) - 90;
      });

      renderer.render(scene, camera);
      frameRef.current = requestAnimationFrame(animate);
    };
    animate();

    const onResize = () => {
      const w = mount.clientWidth, h = mount.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    };
    window.addEventListener("resize", onResize);

    return () => {
      cancelAnimationFrame(frameRef.current);
      window.removeEventListener("resize", onResize);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
      scene.traverse((obj) => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach((m) => m.dispose());
          else obj.material.dispose();
        }
      });
    };
  }, []);

  return <div ref={mountRef} style={{ position: "absolute", inset: 0 }} />;
}

/* ============================== AUTH PAGE ============================== */
function AuthPage({ onBack }) {
  const [mode, setMode] = useState("login"); // "login" | "register"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(""); setInfo(""); setBusy(true);

    if (mode === "register") {
      if (password.length < 6) { setBusy(false); setError("Use a password of at least 6 characters."); return; }
      if (password !== confirm) { setBusy(false); setError("Passwords don't match."); return; }
      const { data, error } = await supabase.auth.signUp({ email: email.trim(), password });
      setBusy(false);
      if (error) { setError(error.message); return; }
      if (data.session) {
        // signed in immediately — App root will pick up the auth state change
        return;
      }
      // no session yet usually means email confirmation is required
      setInfo("Account created — check your email to confirm it, then sign in.");
      setMode("login");
      return;
    }

    const { error } = await supabase.auth.signInWithPassword({ email: email.trim(), password });
    setBusy(false);
    if (error) setError(error.message === "Invalid login credentials" ? "Incorrect email or password." : error.message);
  };

  const forgotPassword = async () => {
    if (!email.trim()) { setError("Enter your email above first, then tap this again."); return; }
    setError(""); setBusy(true);
    const { error } = await supabase.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.origin });
    setBusy(false);
    if (error) setError(error.message);
    else setInfo("Password reset email sent — check your inbox.");
  };

  return (
    <div style={{
      minHeight: "100vh", background: `linear-gradient(160deg, ${C.navy} 0%, ${C.navy2} 100%)`,
      display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT_BODY, padding: 20,
    }}>
      <div style={{ position: "absolute", top: 24, left: 32 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: "rgba(244,242,236,0.7)", cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontFamily: FONT_BODY, fontSize: 14 }}>
          <ChevronLeft size={16} /> Back to site
        </button>
      </div>
      <div style={{ width: 400, maxWidth: "100%", background: "rgba(18,42,70,0.6)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 6, padding: 36, backdropFilter: "blur(10px)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <img src={LOGO_SRC} alt="Fortis" style={{ height: 56, width: "auto" }} />
          <span style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 24, color: C.paper, letterSpacing: 1 }}>FORTIS</span>
        </div>
        <div style={{ fontFamily: FONT_MONO, fontSize: 11, letterSpacing: 2, color: C.amber, marginBottom: 24 }}>OPERATIONS PORTAL</div>

        <h2 style={{ fontFamily: FONT_DISPLAY, fontSize: 26, color: C.paper, margin: "0 0 4px" }}>
          {mode === "register" ? "Create an account" : "Sign in"}
        </h2>
        <p style={{ color: "rgba(244,242,236,0.55)", fontSize: 13.5, margin: "0 0 22px" }}>
          {mode === "register" ? "Set up your login for the Fortis operations portal." : "Enter your credentials to continue."}
        </p>

        <form onSubmit={submit}>
          <label style={fieldLabel}>Email</label>
          <input autoFocus type="email" value={email} onChange={(e) => setEmail(e.target.value)} style={inputStyle} placeholder="you@fortis.org.za" />
          <label style={fieldLabel}>Password</label>
          <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} style={inputStyle} placeholder="••••••••" />
          {mode === "register" && (
            <>
              <label style={fieldLabel}>Confirm password</label>
              <input type="password" value={confirm} onChange={(e) => setConfirm(e.target.value)} style={inputStyle} placeholder="••••••••" />
            </>
          )}
          {error && <div style={{ color: "#F0958A", fontSize: 13, marginTop: 8 }}>{error}</div>}
          {info && <div style={{ color: "#8FD4A8", fontSize: 13, marginTop: 8 }}>{info}</div>}
          <button type="submit" disabled={busy} style={{
            width: "100%", marginTop: 20, background: C.amber, color: C.navy, border: "none",
            padding: "13px 0", borderRadius: 3, fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 17,
            letterSpacing: 0.5, cursor: busy ? "default" : "pointer", opacity: busy ? 0.7 : 1,
          }}>
            {busy ? "PLEASE WAIT…" : mode === "register" ? "CREATE ACCOUNT" : "SIGN IN"}
          </button>
        </form>

        <div style={{ marginTop: 18, textAlign: "center", display: "flex", flexDirection: "column", gap: 8 }}>
          <button onClick={() => { setMode(mode === "login" ? "register" : "login"); setError(""); setInfo(""); }} style={{ background: "none", border: "none", color: C.blue, cursor: "pointer", fontSize: 13.5, fontFamily: FONT_BODY }}>
            {mode === "login" ? "Need an account? Create one" : "Already have an account? Sign in"}
          </button>
          {mode === "login" && (
            <button onClick={forgotPassword} style={{ background: "none", border: "none", color: "rgba(244,242,236,0.5)", cursor: "pointer", fontSize: 12.5, fontFamily: FONT_BODY }}>
              Forgot password?
            </button>
          )}
        </div>
      </div>
    </div>
  );
}
const fieldLabel = { display: "block", fontFamily: FONT_MONO, fontSize: 11, letterSpacing: 1, color: "rgba(244,242,236,0.6)", marginBottom: 6, marginTop: 14 };
const inputStyle = { width: "100%", background: "rgba(11,27,46,0.6)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 3, padding: "11px 12px", color: C.paper, fontSize: 14.5, fontFamily: FONT_BODY, boxSizing: "border-box" };


/* ============================== SHARED SMALL UI ============================== */
function Badge({ status }) {
  const s = STATUS[status] || STATUS.quote;
  return (
    <span style={{ background: s.bg, color: s.color, fontFamily: FONT_MONO, fontSize: 11.5, letterSpacing: 0.5, padding: "4px 10px", borderRadius: 20, whiteSpace: "nowrap" }}>
      {s.label}
    </span>
  );
}
function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontFamily: FONT_MONO, fontSize: 10.5, letterSpacing: 1, color: "#6E7C8C", marginBottom: 6, textTransform: "uppercase" }}>{label}</label>
      {children}
    </div>
  );
}
const dashInput = { width: "100%", border: "1px solid #D8D4C8", borderRadius: 4, padding: "9px 11px", fontFamily: FONT_BODY, fontSize: 14, boxSizing: "border-box", background: "#fff", color: C.ink };
const btnPrimary = { background: C.navy, color: "#fff", border: "none", padding: "10px 18px", borderRadius: 4, fontFamily: FONT_DISPLAY, fontSize: 15, letterSpacing: 0.4, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 8 };
const btnAmber = { ...btnPrimary, background: C.amber, color: C.navy };
const btnGhost = { background: "transparent", color: C.navy, border: "1px solid #D8D4C8", padding: "9px 16px", borderRadius: 4, fontFamily: FONT_DISPLAY, fontSize: 14.5, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 8 };

/* ============================== NEW ORDER FORM ============================== */
function NewOrderModal({ onClose, onCreate, directory }) {
  const [orderId] = useState(() => uid());
  const [school, setSchool] = useState("");
  const [address, setAddress] = useState("");
  const [quoteNumber, setQuoteNumber] = useState("");
  const [quoteAmount, setQuoteAmount] = useState("");
  const [quoteDate, setQuoteDate] = useState(todayISO());
  const [deliveryDate, setDeliveryDate] = useState("");
  const [contacts, setContacts] = useState([{ id: uid(), name: "", role: "", phone: "", email: "" }]);
  const [goodsItems, setGoodsItems] = useState([{ id: uid(), name: "", quantity: "", notes: "", documents: [] }]);
  const [quoteDoc, setQuoteDoc] = useState(null);

  const pickSchool = (name) => {
    setSchool(name);
    const found = directory.find((d) => d.school === name);
    if (found) {
      setAddress(found.address || "");
      if (found.contacts?.length) setContacts(found.contacts.map((c) => ({ ...c, id: uid() })));
    }
  };

  const updateContact = (id, key, val) => setContacts(contacts.map((c) => (c.id === id ? { ...c, [key]: val } : c)));
  const addContact = () => setContacts([...contacts, { id: uid(), name: "", role: "", phone: "", email: "" }]);
  const removeContact = (id) => setContacts(contacts.filter((c) => c.id !== id));

  const updateGoodsItem = (id, key, val) => setGoodsItems(goodsItems.map((g) => (g.id === id ? { ...g, [key]: val } : g)));
  const addGoodsItem = () => setGoodsItems([...goodsItems, { id: uid(), name: "", quantity: "", notes: "", documents: [] }]);
  const removeGoodsItem = (id) => setGoodsItems(goodsItems.filter((g) => g.id !== id));

  const submit = () => {
    if (!school.trim() || !quoteNumber.trim()) return;
    onCreate({
      id: orderId,
      school: school.trim(),
      address: address.trim(),
      goods: goodsItems.filter((g) => g.name.trim()),
      goodsDescription: "",
      quote: { number: quoteNumber.trim(), amount: quoteAmount, date: quoteDate, attached: true },
      po: { number: "", date: "", attached: false },
      orderDate: todayISO(),
      deliveryDate,
      transfer: { reminderDate: "", booked: false, bookedDate: "", carrier: "", vehicleReg: "", driverName: "" },
      contacts: contacts.filter((c) => c.name.trim()),
      followUps: [],
      status: "quote",
      waybill: null,
      documents: quoteDoc ? [quoteDoc] : [],
      createdAt: Date.now(),
    });
  };

  return (
    <ModalShell title="New delivery request" onClose={onClose} wide>
      <Field label="Receiving school">
        <input list="school-list" style={dashInput} value={school} onChange={(e) => pickSchool(e.target.value)} placeholder="e.g. Hoërskool Waterkloof" />
        <datalist id="school-list">{directory.map((d) => <option key={d.id} value={d.school} />)}</datalist>
      </Field>
      <Field label="Delivery address"><input style={dashInput} value={address} onChange={(e) => setAddress(e.target.value)} placeholder="Street, suburb, town" /></Field>

      <div style={{ fontFamily: FONT_MONO, fontSize: 10.5, letterSpacing: 1, color: "#6E7C8C", marginTop: 16, marginBottom: 8, textTransform: "uppercase" }}>Goods / products being shipped</div>
      {goodsItems.map((g) => (
        <div key={g.id} style={{ border: "1px solid #E4E1D6", borderRadius: 4, padding: 10, marginBottom: 8, position: "relative" }}>
          <button type="button" onClick={() => removeGoodsItem(g.id)} style={{ position: "absolute", top: 6, right: 6, background: "none", border: "none", cursor: "pointer", color: "#B0AA9C" }}><X size={14} /></button>
          <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 6, marginBottom: 6 }}>
            <input style={dashInput} placeholder="Item — e.g. Classroom desks" value={g.name} onChange={(e) => updateGoodsItem(g.id, "name", e.target.value)} />
            <input style={dashInput} placeholder="Qty — e.g. 40" value={g.quantity} onChange={(e) => updateGoodsItem(g.id, "quantity", e.target.value)} />
          </div>
          <input style={{ ...dashInput, marginBottom: 8 }} placeholder="Notes (optional)" value={g.notes} onChange={(e) => updateGoodsItem(g.id, "notes", e.target.value)} />
          <AttachmentsList documents={g.documents} onRemove={(doc) => updateGoodsItem(g.id, "documents", g.documents.filter((d) => d.id !== doc.id))} />
          <AttachButton label="Attach spec sheet / photo" orderId={orderId} docType={`goods-${g.id.slice(0, 6)}`} onAttached={(doc) => updateGoodsItem(g.id, "documents", [...g.documents, doc])} />
        </div>
      ))}
      <button type="button" onClick={addGoodsItem} style={{ ...btnGhost, fontSize: 13, padding: "7px 12px", marginBottom: 18 }}><Plus size={14} /> Add item</button>

      <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 26 }}>
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="Quote number"><input style={dashInput} value={quoteNumber} onChange={(e) => setQuoteNumber(e.target.value)} placeholder="Q-2026-0114" /></Field>
            <Field label="Quote amount (R)"><input style={dashInput} value={quoteAmount} onChange={(e) => setQuoteAmount(e.target.value)} placeholder="15 400.00" /></Field>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <Field label="Quote date"><input type="date" style={dashInput} value={quoteDate} onChange={(e) => setQuoteDate(e.target.value)} /></Field>
            <Field label="Requested delivery date"><input type="date" style={dashInput} value={deliveryDate} onChange={(e) => setDeliveryDate(e.target.value)} /></Field>
          </div>
          <Field label="Quote document (optional)">
            {quoteDoc ? (
              <AttachmentsList documents={[quoteDoc]} onRemove={() => setQuoteDoc(null)} />
            ) : (
              <AttachButton label="Attach quote PDF or photo" orderId={orderId} docType="quote" onAttached={setQuoteDoc} />
            )}
          </Field>
        </div>
        <div>
          <div style={{ fontFamily: FONT_MONO, fontSize: 10.5, letterSpacing: 1, color: "#6E7C8C", marginBottom: 8, textTransform: "uppercase" }}>Contact persons at the school</div>
          {contacts.map((c) => (
            <div key={c.id} style={{ border: "1px solid #E4E1D6", borderRadius: 4, padding: 10, marginBottom: 8, position: "relative" }}>
              <button onClick={() => removeContact(c.id)} style={{ position: "absolute", top: 6, right: 6, background: "none", border: "none", cursor: "pointer", color: "#B0AA9C" }}><X size={14} /></button>
              <input style={{ ...dashInput, marginBottom: 6 }} placeholder="Full name" value={c.name} onChange={(e) => updateContact(c.id, "name", e.target.value)} />
              <input style={{ ...dashInput, marginBottom: 6 }} placeholder="Role (e.g. Facilities Manager)" value={c.role} onChange={(e) => updateContact(c.id, "role", e.target.value)} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                <input style={dashInput} placeholder="Phone" value={c.phone} onChange={(e) => updateContact(c.id, "phone", e.target.value)} />
                <input style={dashInput} placeholder="Email" value={c.email} onChange={(e) => updateContact(c.id, "email", e.target.value)} />
              </div>
            </div>
          ))}
          <button onClick={addContact} style={{ ...btnGhost, fontSize: 13, padding: "7px 12px" }}><Plus size={14} /> Add contact</button>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 22, borderTop: "1px solid #E4E1D6", paddingTop: 16 }}>
        <button onClick={onClose} style={btnGhost}>Cancel</button>
        <button onClick={submit} style={btnAmber}><Plus size={16} /> Create request</button>
      </div>
    </ModalShell>
  );
}

function ModalShell({ title, onClose, children, wide }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(11,27,46,0.55)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.paper, borderRadius: 6, padding: 26, width: wide ? 780 : 480, maxWidth: "100%", maxHeight: "88vh", overflowY: "auto", boxShadow: "0 30px 80px rgba(0,0,0,0.4)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <h2 style={{ fontFamily: FONT_DISPLAY, fontSize: 22, color: C.ink, margin: 0 }}>{title}</h2>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: "#8A8578" }}><X size={20} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ============================== ORDER DETAIL ============================== */
function OrderDetail({ order, onClose, onUpdate }) {
  const [poNumber, setPoNumber] = useState(order.po.number);
  const [poDate, setPoDate] = useState(order.po.date || todayISO());
  const [reminderDate, setReminderDate] = useState(order.transfer.reminderDate || "");
  const [deliveryDate, setDeliveryDate] = useState(order.deliveryDate || "");
  const [followNote, setFollowNote] = useState("");
  const [showBookForm, setShowBookForm] = useState(false);
  const [carrier, setCarrier] = useState(order.transfer.carrier || "Fortis Fleet");
  const [vehicleReg, setVehicleReg] = useState(order.transfer.vehicleReg || "");
  const [driverName, setDriverName] = useState(order.transfer.driverName || "");
  const [showDeliverForm, setShowDeliverForm] = useState(false);
  const [deliveredDate, setDeliveredDate] = useState(todayISO());
  const [deliveredTime, setDeliveredTime] = useState("");
  const [receivedBy, setReceivedBy] = useState(order.contacts[0]?.name || "");

  const attachPO = () => {
    if (!poNumber.trim()) return;
    onUpdate({ ...order, po: { number: poNumber.trim(), date: poDate, attached: true }, status: "confirmed" });
  };
  const saveDates = () => onUpdate({ ...order, deliveryDate, transfer: { ...order.transfer, reminderDate } });
  const addFollowUp = () => {
    if (!followNote.trim()) return;
    onUpdate({ ...order, followUps: [...order.followUps, { id: uid(), date: new Date().toISOString(), note: followNote.trim() }] });
    setFollowNote("");
  };
  const bookTransfer = () => {
    onUpdate({ ...order, status: "booked", transfer: { ...order.transfer, booked: true, bookedDate: todayISO(), carrier, vehicleReg, driverName } });
    setShowBookForm(false);
  };
  const markDelivered = () => {
    const waybillNumber = `FRT-WB-${new Date().getFullYear()}-${order.id.slice(0, 4).toUpperCase()}`;
    onUpdate({
      ...order, status: "delivered",
      waybill: { number: waybillNumber, deliveredDate, deliveredTime, receivedBy, notes: "" },
    });
    setShowDeliverForm(false);
  };
  const addDocument = (doc) => onUpdate({ ...order, documents: [...(order.documents || []), doc] });
  const removeDocument = async (doc) => {
    await deleteDocument(doc.path);
    onUpdate({ ...order, documents: (order.documents || []).filter((d) => d.id !== doc.id) });
  };
  const updateGoods = (items) => onUpdate({ ...order, goods: items });
  const addGoodsItem = () => updateGoods([...(order.goods || []), { id: uid(), name: "", quantity: "", notes: "", documents: [] }]);
  const updateGoodsItem = (id, key, val) => updateGoods((order.goods || []).map((g) => (g.id === id ? { ...g, [key]: val } : g)));
  const removeGoodsItem = (id) => updateGoods((order.goods || []).filter((g) => g.id !== id));
  const addGoodsDoc = (itemId, doc) => updateGoods((order.goods || []).map((g) => (g.id === itemId ? { ...g, documents: [...(g.documents || []), doc] } : g)));
  const removeGoodsDoc = (itemId, doc) => updateGoods((order.goods || []).map((g) => (g.id === itemId ? { ...g, documents: (g.documents || []).filter((d) => d.id !== doc.id) } : g)));

  const dUntil = daysUntil(order.deliveryDate);

  return (
    <ModalShell title={order.school} onClose={onClose} wide>
      <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 18 }}>
        <Badge status={order.status} />
        <span style={{ fontFamily: FONT_MONO, fontSize: 12.5, color: "#6E7C8C" }}>Order date {fmtDate(order.orderDate)}</span>
        {order.deliveryDate && <span style={{ fontFamily: FONT_MONO, fontSize: 12.5, color: "#6E7C8C" }}>· Delivery {fmtDate(order.deliveryDate)}</span>}
        {order.status !== "delivered" && dUntil !== null && (
          <span style={{ fontFamily: FONT_MONO, fontSize: 12, color: dUntil < 0 ? C.red : dUntil <= 2 ? C.amberDeep : "#6E7C8C" }}>
            {dUntil < 0 ? `${Math.abs(dUntil)}d overdue` : dUntil === 0 ? "Due today" : `in ${dUntil}d`}
          </span>
        )}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 26 }}>
        <div>
          <SectionTitle>Job details</SectionTitle>
          <p style={{ fontSize: 13, color: "#6E7C8C", marginTop: -6 }}><MapPin size={13} style={{ marginRight: 5, verticalAlign: -2 }} />{order.address || "No address on file"}</p>

          <SectionTitle>Goods / products being shipped</SectionTitle>
          {order.goods && order.goods.length > 0 ? (
            order.goods.map((g) => (
              <div key={g.id} style={{ border: "1px solid #E4E1D6", borderRadius: 4, padding: 10, marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div style={{ fontFamily: FONT_DISPLAY, fontSize: 15 }}>
                    {g.name || "Untitled item"} {g.quantity && <span style={{ color: "#6E7C8C", fontFamily: FONT_BODY, fontSize: 12.5 }}>× {g.quantity}</span>}
                  </div>
                  <button onClick={() => removeGoodsItem(g.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#B0AA9C" }}><X size={14} /></button>
                </div>
                {g.notes && <div style={{ fontSize: 12.5, color: "#6E7C8C", marginTop: 2, marginBottom: 6 }}>{g.notes}</div>}
                <AttachmentsList documents={g.documents} onRemove={(doc) => removeGoodsDoc(g.id, doc)} />
                <AttachButton label="Attach spec sheet / photo" orderId={order.id} docType={`goods-${g.id.slice(0, 6)}`} onAttached={(doc) => addGoodsDoc(g.id, doc)} />
              </div>
            ))
          ) : order.goodsDescription ? (
            <p style={{ fontSize: 14, color: "#3B4652" }}>{order.goodsDescription}</p>
          ) : (
            <p style={{ fontSize: 13, color: "#6E7C8C" }}>No items added yet.</p>
          )}
          <button onClick={addGoodsItem} style={{ ...btnGhost, fontSize: 13, padding: "7px 12px", marginBottom: 4 }}><Plus size={14} /> Add item</button>

          <SectionTitle>Documents</SectionTitle>
          <AttachmentsList documents={order.documents} onRemove={removeDocument} />
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <AttachButton label="Quote" orderId={order.id} docType="quote" onAttached={addDocument} />
            <AttachButton label="PO" orderId={order.id} docType="po" onAttached={addDocument} />
            <AttachButton label="Waybill" orderId={order.id} docType="waybill" onAttached={addDocument} />
            <AttachButton label="Other" orderId={order.id} docType="other" onAttached={addDocument} />
          </div>

          <SectionTitle>Quote — attached</SectionTitle>
          <DocLine label={order.quote.number} sub={`R ${order.quote.amount || "—"} · ${fmtDate(order.quote.date)}`} ok />

          <SectionTitle>Purchase order</SectionTitle>
          {order.po.attached ? (
            <DocLine label={order.po.number} sub={fmtDate(order.po.date)} ok />
          ) : (
            <div style={{ display: "flex", gap: 8 }}>
              <input style={dashInput} placeholder="PO number" value={poNumber} onChange={(e) => setPoNumber(e.target.value)} />
              <input type="date" style={dashInput} value={poDate} onChange={(e) => setPoDate(e.target.value)} />
              <button onClick={attachPO} style={{ ...btnPrimary, whiteSpace: "nowrap" }}>Attach PO</button>
            </div>
          )}

          <SectionTitle>Delivery &amp; transfer</SectionTitle>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="Delivery date"><input type="date" style={dashInput} value={deliveryDate} onChange={(e) => setDeliveryDate(e.target.value)} /></Field>
            <Field label="Book-transfer reminder"><input type="date" style={dashInput} value={reminderDate} onChange={(e) => setReminderDate(e.target.value)} /></Field>
          </div>
          <button onClick={saveDates} style={{ ...btnGhost, fontSize: 13, marginBottom: 10 }}>Save dates</button>

          {order.transfer.booked ? (
            <DocLine label={`${order.transfer.carrier} · ${order.transfer.vehicleReg}`} sub={`Driver: ${order.transfer.driverName} · Booked ${fmtDate(order.transfer.bookedDate)}`} ok />
          ) : order.status !== "cancelled" && order.status !== "delivered" ? (
            showBookForm ? (
              <div style={{ border: "1px solid #E4E1D6", borderRadius: 4, padding: 10 }}>
                <Field label="Carrier"><input style={dashInput} value={carrier} onChange={(e) => setCarrier(e.target.value)} /></Field>
                <Field label="Vehicle registration"><input style={dashInput} value={vehicleReg} onChange={(e) => setVehicleReg(e.target.value)} placeholder="e.g. CA 123-456" /></Field>
                <Field label="Driver name"><input style={dashInput} value={driverName} onChange={(e) => setDriverName(e.target.value)} /></Field>
                <button onClick={bookTransfer} style={btnAmber}><CalendarClock size={15} /> Confirm booking</button>
              </div>
            ) : (
              <button onClick={() => setShowBookForm(true)} style={btnAmber}><CalendarClock size={15} /> Book transfer</button>
            )
          ) : null}
        </div>

        <div>
          <SectionTitle>Contact persons at the school</SectionTitle>
          {order.contacts.length === 0 && <p style={{ fontSize: 13, color: "#6E7C8C" }}>No contacts recorded.</p>}
          {order.contacts.map((c) => (
            <div key={c.id} style={{ border: "1px solid #E4E1D6", borderRadius: 4, padding: "8px 12px", marginBottom: 8 }}>
              <div style={{ fontFamily: FONT_DISPLAY, fontSize: 15.5 }}>{c.name} <span style={{ color: "#6E7C8C", fontFamily: FONT_BODY, fontSize: 12.5 }}>· {c.role}</span></div>
              <div style={{ fontSize: 12.5, color: "#6E7C8C", display: "flex", gap: 12, marginTop: 2 }}>
                {c.phone && <span><Phone size={11} style={{ verticalAlign: -1 }} /> {c.phone}</span>}
                {c.email && <span><Mail size={11} style={{ verticalAlign: -1 }} /> {c.email}</span>}
              </div>
            </div>
          ))}

          <SectionTitle>Follow-up log</SectionTitle>
          <div style={{ maxHeight: 150, overflowY: "auto", marginBottom: 8 }}>
            {order.followUps.length === 0 && <p style={{ fontSize: 13, color: "#6E7C8C" }}>No follow-ups logged yet.</p>}
            {[...order.followUps].reverse().map((f) => (
              <div key={f.id} style={{ fontSize: 13, marginBottom: 8, paddingLeft: 10, borderLeft: `2px solid ${C.blue}` }}>
                <div style={{ color: "#6E7C8C", fontFamily: FONT_MONO, fontSize: 11 }}>{new Date(f.date).toLocaleString("en-ZA")}</div>
                {f.note}
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input style={dashInput} placeholder="Log a follow-up (e.g. confirmed with driver)" value={followNote} onChange={(e) => setFollowNote(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addFollowUp()} />
            <button onClick={addFollowUp} style={btnGhost}>Add</button>
          </div>

          <SectionTitle>Waybill</SectionTitle>
          {order.waybill ? (
            <DocLine label={order.waybill.number} sub={`Delivered ${fmtDate(order.waybill.deliveredDate)} · Received by ${order.waybill.receivedBy}`} ok />
          ) : order.status === "booked" ? (
            showDeliverForm ? (
              <div style={{ border: "1px solid #E4E1D6", borderRadius: 4, padding: 10 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

/* ---- attach-a-file button: tap to pick a photo or PDF from the phone, uploads immediately ---- */
function AttachButton({ label, orderId, docType, onAttached }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const inputRef = useRef(null);

  const handleFile = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = ""; // allow picking the same file again later
    if (!file) return;
    setBusy(true); setError("");
    try {
      const doc = await uploadDocument(orderId, docType, file);
      onAttached(doc);
    } catch (err) {
      setError("Upload failed — try again.");
    }
    setBusy(false);
  };

  return (
    <div>
      <input ref={inputRef} type="file" accept="image/*,.pdf" style={{ display: "none" }} onChange={handleFile} />
      <button type="button" onClick={() => inputRef.current?.click()} disabled={busy} style={{ ...btnGhost, fontSize: 13, padding: "8px 14px", opacity: busy ? 0.6 : 1 }}>
        {busy ? <Loader2 size={14} className="spin" /> : <Paperclip size={14} />} {busy ? "Uploading…" : label}
      </button>
      {error && <div style={{ color: C.red, fontSize: 12, marginTop: 4 }}>{error}</div>}
    </div>
  );
}

/* ---- lists every file attached to an order, with tap-to-view and remove ---- */
function AttachmentsList({ documents, onRemove }) {
  const [opening, setOpening] = useState(null);

  const openDoc = async (doc) => {
    setOpening(doc.id);
    const url = await getDocumentUrl(doc.path);
    setOpening(null);
    if (url) window.open(url, "_blank");
    else alert("Couldn't open that file — try again.");
  };

  if (!documents || documents.length === 0) return null;

  return (
    <div style={{ marginBottom: 10 }}>
      {documents.map((doc) => (
        <div key={doc.id} style={{ display: "flex", alignItems: "center", gap: 8, border: "1px solid #E4E1D6", borderRadius: 4, padding: "8px 10px", marginBottom: 6 }}>
          <FileText size={15} color={C.blue} style={{ flexShrink: 0 }} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{doc.name}</div>
            <div style={{ fontSize: 11, color: "#6E7C8C" }}>{fmtDate(doc.uploadedAt?.slice(0, 10))}</div>
          </div>
          <button type="button" onClick={() => openDoc(doc)} style={{ background: "none", border: "none", cursor: "pointer", color: C.blue, display: "flex", alignItems: "center" }}>
            {opening === doc.id ? <Loader2 size={16} className="spin" /> : <Eye size={16} />}
          </button>
          {onRemove && (
            <button type="button" onClick={() => onRemove(doc)} style={{ background: "none", border: "none", cursor: "pointer", color: "#B0AA9C" }}>
              <Trash2 size={15} />
            </button>
          )}
        </div>
      ))}
    </div>
  );
}

/* ============================== DASHBOARD ============================== */
function Dashboard({ username, orders, setOrders, directory, setDirectory, onLogout }) {
  const [tab, setTab] = useState("overview");
  const [showNew, setShowNew] = useState(false);
  const [activeOrder, setActiveOrder] = useState(null);
  const [waybillOrder, setWaybillOrder] = useState(null);
  const [search, setSearch] = useState("");

  const persistOrders = (list) => { setOrders(list); saveKey("fortis-orders", list); };
  const persistDirectory = (list) => { setDirectory(list); saveKey("fortis-directory", list); };

  const createOrder = (order) => {
    persistOrders([order, ...orders]);
    // update directory
    const existing = directory.find((d) => d.school === order.school);
    if (!existing) {
      persistDirectory([...directory, { id: uid(), school: order.school, address: order.address, contacts: order.contacts }]);
    }
    setShowNew(false);
  };
  const updateOrder = (updated) => {
    persistOrders(orders.map((o) => (o.id === updated.id ? updated : o)));
    setActiveOrder(updated);
  };

  const active = orders.filter((o) => o.status !== "delivered" && o.status !== "cancelled");
  const awaitingTransfer = active.filter((o) => !o.transfer.booked && o.status === "confirmed");
  const inTransit = orders.filter((o) => o.status === "booked");
  const deliveredThisMonth = orders.filter((o) => {
    if (!o.waybill) return false;
    const d = new Date(o.waybill.deliveredDate);
    const now = new Date();
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });

  const reminders = orders
    .filter((o) => o.status === "confirmed" && !o.transfer.booked)
    .map((o) => {
      const rd = o.transfer.reminderDate || (o.deliveryDate ? addDays(o.deliveryDate, -3) : null);
      return { order: o, reminderDate: rd, days: rd ? daysUntil(rd) : null };
    })
    .filter((r) => r.reminderDate)
    .sort((a, b) => a.days - b.days);

  const filteredOrders = orders.filter((o) =>
    o.school.toLowerCase().includes(search.toLowerCase()) ||
    o.quote.number.toLowerCase().includes(search.toLowerCase()) ||
    (o.po.number || "").toLowerCase().includes(search.toLowerCase())
  );

  const NAV = [
    { id: "overview", label: "Overview", icon: ClipboardCheck },
    { id: "orders", label: "Orders", icon: Package },
    { id: "reminders", label: "Reminders", icon: Bell, count: reminders.filter((r) => r.days <= 2).length },
    { id: "contacts", label: "Schools & contacts", icon: School },
    { id: "waybills", label: "Waybills", icon: FileText },

  return (
    <div style={{ display: "flex", minHeight: "100vh", fontFamily: FONT_BODY, background: "#EFEDE6" }}>
      {/* SIDEBAR */}
      <div style={{ width: 240, background: C.navy, color: C.paper, display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ padding: "20px 20px", display: "flex", alignItems: "center", gap: 10, borderBottom: "1px solid rgba(255,255,255,0.1)" }}>
          <img src={LOGO_SRC} style={{ height: 42, width: "auto" }} alt="Fortis" />
          <span style={{ fontFamily: FONT_DISPLAY, fontWeight: 700, fontSize: 19, letterSpacing: 0.5 }}>FORTIS</span>
        </div>
        <div style={{ padding: "16px 12px", flex: 1 }}>
          {NAV.map((n) => (
            <button key={n.id} onClick={() => setTab(n.id)} style={{
              width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", marginBottom: 4,
              background: tab === n.id ? "rgba(232,146,46,0.15)" : "transparent",
              color: tab === n.id ? C.amber : "rgba(244,242,236,0.75)",
              border: "none", borderRadius: 4, cursor: "pointer", fontFamily: FONT_DISPLAY, fontSize: 15.5, letterSpacing: 0.3,
            }}>
              <n.icon size={17} /> {n.label}
              {!!n.count && <span style={{ marginLeft: "auto", background: C.red, color: "#fff", fontSize: 10.5, borderRadius: 10, padding: "1px 6px", fontFamily: FONT_MONO }}>{n.count}</span>}
            </button>
          ))}
        </div>
        <div style={{ padding: "16px 20px", borderTop: "1px solid rgba(255,255,255,0.1)" }}>
          <div style={{ fontSize: 12.5, color: "rgba(244,242,236,0.6)", marginBottom: 8 }}>Signed in as <b style={{ color: C.paper }}>{username}</b></div>
          <button onClick={onLogout} style={{ ...btnGhost, width: "100%", justifyContent: "center", color: C.paper, borderColor: "rgba(255,255,255,0.2)" }}><LogOut size={14} /> Log out</button>
        </div>
      </div>

      <div style={{ flex: 1, padding: "28px 34px", overflowY: "auto" }}>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px,1fr))", gap: 16, marginBottom: 30 }}>
              <StatCard label="Active jobs" value={active.length} icon={Package} color={C.blue} />
              <StatCard label="Awaiting transfer booking" value={awaitingTransfer.length} icon={CalendarClock} color={C.amber} />
              <StatCard label="In transit" value={inTransit.length} icon={Truck} color="#8A6FD8" />

            <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 20 }}>
              <Panel title="Recent orders">
                {orders.slice(0, 6).map((o) => <OrderRow key={o.id} o={o} onClick={() => setActiveOrder(o)} />)}
                {orders.length === 0 && <EmptyNote>No requests yet — create your first one.</EmptyNote>}
              </Panel>
              <Panel title="Upcoming transfer reminders">
                {reminders.slice(0, 6).map((r) => (
                  <div key={r.order.id} onClick={() => setActiveOrder(r.order)} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: "1px solid #E4E1D6", cursor: "pointer" }}>

                {reminders.length === 0 && <EmptyNote>No pending reminders.</EmptyNote>}
              </Panel>
            </div>
          </>
        )}

        {tab === "orders" && (
          <>
            <PageHeader title="Orders" sub={`${orders.length} total requests`} action={{ label: "New request", onClick: () => setShowNew(true) }} />
            <div style={{ display: "flex", alignItems: "center", background: "#fff", border: "1px solid #D8D4C8", borderRadius: 4, padding: "8px 12px", marginBottom: 16, maxWidth: 360 }}>
              <Search size={15} color="#8A8578" />

            </div>
            <Panel>
              {filteredOrders.map((o) => <OrderRow key={o.id} o={o} onClick={() => setActiveOrder(o)} detailed />)}
              {filteredOrders.length === 0 && <EmptyNote>No matching orders.</EmptyNote>}
            </Panel>
          </>
        )}

        {tab === "reminders" && (
          <>
            <PageHeader title="Reminders" sub="Book transfers before it's too late" />
            <Panel>
              {reminders.map((r) => (
                <div key={r.order.id} onClick={() => setActiveOrder(r.order)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 4px", borderBottom: "1px solid #E4E1D6", cursor: "pointer" }}>

                    {r.days < 0 ? <AlertTriangle size={18} color={C.red} /> : r.days <= 2 ? <Bell size={18} color={C.amberDeep} /> : <Clock size={18} color="#6E7C8C" />}

          <>

            <Panel>
              {orders.filter((o) => o.waybill).map((o) => (

                    <div style={{ fontSize: 12.5, color: "#6E7C8C" }}>{o.school} · Delivered {fmtDate(o.waybill.deliveredDate)}</div>

              {orders.filter((o) => o.waybill).length === 0 && <EmptyNote>No waybills generated yet.</EmptyNote>}
            </Panel>
          </>
        )}
      </div>

      {showNew && <NewOrderModal onClose={() => setShowNew(false)} onCreate={createOrder} directory={directory} />}
      {activeOrder && <OrderDetail order={activeOrder} onClose={() => setActiveOrder(null)} onUpdate={updateOrder} />}

function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

  );

    <div onClick={onClick} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 4px", borderBottom: "1px solid #E4E1D6", cursor: "pointer" }}>
      <div>
        <div style={{ fontFamily: FONT_DISPLAY, fontSize: 16 }}>{o.school}</div>
        <div style={{ fontSize: 12.5, color: "#6E7C8C" }}>
          Quote {o.quote.number}{o.po.attached ? ` · PO ${o.po.number}` : ""}{detailed && o.deliveryDate ? ` · Delivery ${fmtDate(o.deliveryDate)}` : ""}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <Badge status={o.status} />
        <ChevronRight size={16} color="#B0AA9C" />
      </div>
    </div>
  );
}

/* ============================== APP ROOT ============================== */
export default function App() {
  const [view, setView] = useState("landing");
  const [orders, setOrders] = useState([]);
  const [directory, setDirectory] = useState([]);
  const [session, setSession] = useState(null);
  const [ready, setReady] = useState(false);

  // real Supabase auth session — persists across reloads on its own
  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => {
      setSession(data.session);
      if (data.session) setView("dashboard");
      setReady(true);
    });
    const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => {
      setSession(sess);
      setView(sess ? "dashboard" : "landing");
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  // load business data once we know someone is signed in
  useEffect(() => {
    if (!session) return;
    (async () => {
      const [o, d] = await Promise.all([
        loadKey("fortis-orders", []),
        loadKey("fortis-directory", []),
      ]);
      setOrders(o); setDirectory(d);
    })();
  }, [session]);

  const logout = async () => {
    await supabase.auth.signOut();
    setView("landing");
  };

  if (!ready) {
    return (
      <div style={{ minHeight: "100vh", background: C.navy, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: C.paper, fontFamily: FONT_MONO, letterSpacing: 2, fontSize: 13 }}>LOADING FORTIS…</div>
      </div>
    );
  }

  if (view === "dashboard" && session) {
    return <Dashboard username={session.user.email} orders={orders} setOrders={setOrders} directory={directory} setDirectory={setDirectory} onLogout={logout} />;
  }
  if (view === "auth") {
    return <AuthPage onBack={() => setView("landing")} />;
  }
  return <LandingPage onLogin={() => setView("auth")} />;
}

</script>
