<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fortis — Operations Portal</title>
<meta name="description" content="Fortis — freight and campus delivery logistics." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  @media print {
    body * { visibility: hidden; }
    #waybill-print, #waybill-print * { visibility: visible; }
